metadata:
  experiment_id: t21_exp09_focal_loss
  objective: rare_event_focus
task:
  horizon_hours: 24
  meteo_lookback_steps: 48
  image_lookback_steps: 16
model:
  conv_hidden_dim: 64
  meteo_hidden_dim: 128
  fusion_hidden_dim: 64
  dropout: 0.45
train:
  batch_size: 64
  epochs: 14
  learning_rate: 0.0008
  weight_decay: 0.0001
  loss:
    type: focal
    focal_gamma: 2.0
    focal_alpha: 0.25
  decision_threshold: 0.45
  precision_threshold: 0.70
  seed: 42

